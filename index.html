<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regolazione Invito</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    overflow:hidden;
}


.container{
    position:relative;
    width:100%;
    max-width:1654px;
    margin:auto;
}


img{
    width:100%;
    display:block;
}


/* BOX DI REGOLAZIONE */

.box{
    position:absolute;
    cursor:pointer;
}


#si{
    background:rgba(255,0,0,0.4);
    left:16%;
    top:80%;
    width:8%;
    height:8%;
}


#no{
    background:rgba(0,0,255,0.4);
    left:76%;
    top:80%;
    width:8%;
    height:8%;
}


#luogo{
    background:rgba(0,255,0,0.4);
    left:32%;
    top:66%;
    width:36%;
    height:6%;
}


#info{
    position:fixed;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
    font-family:Arial;
    font-size:14px;
    z-index:10;
}


</style>

</head>


<body>


<div id="info">
Seleziona un box:<br>
S = SI 🔴<br>
N = NO 🔵<br>
L = LUOGO 🟢<br>
Usa le frecce per spostare<br><br>
<div id="coord"></div>
</div>


<div class="container">

<img src="invito.png">


<div id="si" class="box"></div>

<div id="no" class="box"></div>

<div id="luogo" class="box"></div>


</div>


<script>


let selected = "si";


let boxes = {
si: document.getElementById("si"),
no: document.getElementById("no"),
luogo: document.getElementById("luogo")
};



document.addEventListener("keydown", function(e){


if(e.key.toLowerCase()=="s") selected="si";
if(e.key.toLowerCase()=="n") selected="no";
if(e.key.toLowerCase()=="l") selected="luogo";


let box = boxes[selected];

let style = window.getComputedStyle(box);


let left=parseFloat(style.left);
let top=parseFloat(style.top);



if(e.key=="ArrowRight") left+=0.5;
if(e.key=="ArrowLeft") left-=0.5;
if(e.key=="ArrowDown") top+=0.5;
if(e.key=="ArrowUp") top-=0.5;


box.style.left=left+"%";
box.style.top=top+"%";


document.getElementById("coord").innerHTML=
"<b>"+selected+"</b><br>"+
"left: "+left.toFixed(1)+"%<br>"+
"top: "+top.toFixed(1)+"%";


});


</script>


</body>

</html>
